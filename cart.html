<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Cart — DailyDrop</title>
  <meta name="description" content="Review your cart and proceed to checkout on DailyDrop.">
  <link rel="icon" type="image/png" href="./static/logo1.webp">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="./design-system.css">
  <script>
    (function() {
      const theme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>

  <style>
    body {
      background: var(--surface-1);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── CART PAGE ── */
    .cart-page {
      max-width: 1100px;
      margin: var(--space-10) auto var(--space-16);
      padding: 0 var(--space-6);
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: var(--space-8);
      align-items: start;
    }

    .cart-left h2 {
      font-size: var(--text-2xl);
      font-weight: var(--weight-bold);
      color: var(--text-primary);
      letter-spacing: -0.4px;
      margin-bottom: var(--space-6);
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .cart-left h2::before {
      content: '';
      width: 4px;
      height: 24px;
      background: linear-gradient(to bottom, var(--brand), var(--brand-dark));
      border-radius: var(--radius-full);
      flex-shrink: 0;
    }

    /* ── CART ITEMS ── */
    .cart-items {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }

    .cart-item {
      background: var(--surface-0);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
      display: flex;
      align-items: center;
      gap: var(--space-5);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-card);
      transition: all 0.25s var(--ease-out);
    }

    .cart-item:hover {
      border-color: var(--border-brand);
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    .cart-item img {
      width: 90px;
      height: 90px;
      object-fit: contain;
      border-radius: var(--radius-md);
      background: var(--surface-2);
      padding: var(--space-2);
      flex-shrink: 0;
      border: 1px solid var(--border);
    }

    .cart-item-details {
      flex: 1;
      min-width: 0;
    }

    .cart-item-details h3 {
      font-size: var(--text-base);
      font-weight: var(--weight-semi);
      color: var(--text-primary);
      margin: 0 0 var(--space-1) 0;
      line-height: 1.4;
    }

    .cart-item-details p {
      font-size: var(--text-sm);
      color: var(--text-secondary);
      margin: 0 0 var(--space-2) 0;
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .cart-item-details p:last-child { margin-bottom: 0; }

    .cart-item-details span {
      color: var(--brand);
      font-weight: var(--weight-bold);
    }

    /* Quantity controls */
    .qty-controls {
      display: inline-flex;
      align-items: center;
      background: var(--surface-2);
      padding: 2px;
      border-radius: var(--radius-full);
      margin-top: var(--space-2);
      border: 1px solid var(--border);
    }

    .qty-btn {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface-0);
      color: var(--text-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-full);
      font-size: var(--text-sm);
      font-weight: var(--weight-bold);
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-out);
      box-shadow: var(--shadow-xs);
    }

    .qty-btn:hover {
      background: var(--brand);
      color: white;
      border-color: var(--brand);
      transform: scale(1.05);
    }

    .qty-num {
      width: 34px;
      text-align: center;
      font-size: var(--text-sm);
      font-weight: var(--weight-semi);
      color: var(--text-primary);
    }

    .remove-btn {
      background: var(--danger-light);
      color: var(--danger);
      border: 1px solid rgba(239,68,68,0.15);
      border-radius: var(--radius-full);
      padding: 6px 14px;
      font-size: var(--text-xs);
      font-weight: var(--weight-semi);
      cursor: pointer;
      transition: all var(--duration-base) var(--ease-out);
      margin-top: var(--space-3);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .remove-btn:hover {
      background: var(--danger);
      color: white;
      border-color: var(--danger);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2);
    }

    /* ── EMPTY CART ── */
    .empty-cart {
      background: var(--surface-0);
      border-radius: var(--radius-xl);
      border: 1px solid var(--border);
      padding: var(--space-20) var(--space-8);
      text-align: center;
      grid-column: 1 / -1;
      box-shadow: var(--shadow-md);
    }

    .empty-cart-emoji {
      font-size: 4rem;
      display: block;
      margin-bottom: var(--space-4);
      opacity: 0.5;
    }

    .empty-cart h3 {
      font-size: var(--text-xl);
      font-weight: var(--weight-semi);
      color: var(--text-primary);
      margin-bottom: var(--space-2);
    }

    .empty-cart p {
      color: var(--text-muted);
      font-size: var(--text-sm);
      margin-bottom: var(--space-6);
    }

    .empty-cart a {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: 12px 24px;
      background: var(--brand);
      color: white;
      border-radius: var(--radius-full);
      font-weight: var(--weight-semi);
      font-size: var(--text-sm);
      text-decoration: none;
      transition: all 0.25s var(--ease-out);
      box-shadow: var(--shadow-brand);
    }

    .empty-cart a:hover {
      background: var(--brand-dark);
      transform: translateY(-2px);
      box-shadow: var(--shadow-brand);
    }

    /* ── CART SUMMARY ── */
    .cart-summary {
      background: var(--surface-glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.65);
      border-radius: var(--radius-2xl);
      box-shadow: var(--shadow-lg);
      padding: var(--space-6);
      position: sticky;
      top: calc(var(--nav-height) + var(--space-5));
      transition: all var(--duration-slow) var(--ease-out);
    }

    .cart-summary h3 {
      font-size: var(--text-lg);
      font-weight: var(--weight-bold);
      color: var(--text-primary);
      margin-bottom: var(--space-5);
      padding-bottom: var(--space-4);
      border-bottom: 1px solid var(--border);
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: var(--text-sm);
      color: var(--text-secondary);
      margin-bottom: var(--space-3);
    }

    .summary-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: var(--space-4);
      border-top: 1px solid var(--border);
      margin-top: var(--space-2);
      margin-bottom: var(--space-5);
    }

    .summary-total-label {
      font-size: var(--text-base);
      font-weight: var(--weight-semi);
      color: var(--text-primary);
    }

    .summary-total-amount {
      font-size: var(--text-2xl);
      font-weight: var(--weight-bold);
      color: var(--brand);
      letter-spacing: -0.5px;
    }

    .proceed-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      font-size: var(--text-base);
      font-weight: var(--weight-semi);
      cursor: pointer;
      transition: all 0.25s var(--ease-out);
      box-shadow: var(--shadow-brand);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      font-family: var(--font);
    }

    .proceed-btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-brand-lg);
    }

    .free-delivery-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      margin-top: var(--space-3);
      font-size: var(--text-xs);
      color: var(--brand);
      font-weight: var(--weight-medium);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .cart-page {
        grid-template-columns: 1fr;
        gap: var(--space-5);
        margin-top: var(--space-6);
      }
      .cart-summary { position: static; }
      .cart-item img { width: 72px; height: 72px; }
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="ds-nav">
    <div class="ds-nav-inner">
      <a href="index.html" class="ds-logo">
        <div class="ds-logo-icon">🛒</div>
        <div class="ds-logo-text">Daily<span>Drop</span></div>
      </a>
      <div class="ds-nav-actions">
        <button class="theme-toggle-pill" id="theme-toggle" aria-label="Toggle theme">
          <span class="theme-toggle-pill-thumb"></span>
          <span class="theme-toggle-pill-icon light-icon"><i class="fas fa-sun"></i></span>
          <span class="theme-toggle-pill-icon dark-icon"><i class="fas fa-moon"></i></span>
        </button>
        <a href="index.html" class="btn-nav"><i class="fas fa-home"></i> Home</a>
        <a href="cart.html" class="btn-cart">
          <i class="fas fa-shopping-bag"></i> Cart
          <span class="cart-badge" id="cart-count">0</span>
        </a>
      </div>
    </div>
  </nav>

  <main style="flex: 1;">
    <div class="cart-page" id="cartPageContainer">
      <div class="cart-left" id="cartLeft">
        <h2>Your Cart</h2>
        <div id="cartItems" class="cart-items">
          <!-- Cart items loaded here -->
        </div>
      </div>
      <div id="cartSummary" class="cart-summary" style="display:none;">
        <h3>Order Summary</h3>
        <div class="summary-row">
          <span>Subtotal</span>
          <span id="subtotalPrice">Rs.0.00</span>
        </div>
        <div class="summary-row">
          <span>Delivery</span>
          <span style="color: var(--brand); font-weight: 600;">FREE</span>
        </div>
        <div class="summary-total">
          <span class="summary-total-label">Total</span>
          <span class="summary-total-amount" id="totalPrice">Rs.0.00</span>
        </div>
        <button class="proceed-btn" onclick="proceedToCheckout()">
          <i class="fas fa-arrow-right"></i>
          Proceed to Checkout
        </button>
        <div class="free-delivery-badge">
          <i class="fas fa-truck"></i>
          Free delivery on all orders
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="ds-footer">
    <div class="container">
      <div style="text-align: center; padding: var(--space-8) 0; color: var(--text-muted); font-size: var(--text-xs); border-top: 1px solid rgba(255,255,255,0.06);">
        &copy; 2026 DailyDrop. All rights reserved.
      </div>
    </div>
  </footer>

  <script src="js/cart-system.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      loadCart();
    });

    window.addEventListener('cartUpdated', loadCart);

    function loadCart() {
      const cart = JSON.parse(localStorage.getItem('cart')) || [];
      const cartItemsDiv = document.getElementById('cartItems');
      const cartLeft = document.getElementById('cartLeft');
      if (!cartItemsDiv || !cartLeft) return;
      cartItemsDiv.innerHTML = '';

      if (cart.length === 0) {
        cartLeft.innerHTML = `
          <div class="empty-cart">
            <span class="empty-cart-emoji">🛒</span>
            <h3>Your cart is empty</h3>
            <p>Looks like you haven't added anything yet.<br>Start shopping and add items to your cart.</p>
            <a href="index.html"><i class="fas fa-arrow-left"></i> Browse Products</a>
          </div>
        `;
        const summary = document.getElementById('cartSummary');
        if (summary) summary.style.display = 'none';
        return;
      }

      let grandTotal = 0;
      cart.forEach(item => {
        const itemTotal = item.price * item.quantity;
        grandTotal += itemTotal;

        const itemDiv = document.createElement('div');
        itemDiv.className = 'cart-item';
        itemDiv.innerHTML = `
          <img src="${item.image}" alt="${item.name}" onerror="this.src='./static/logo1.webp'" />
          <div class="cart-item-details">
            <h3>${item.name}</h3>
            <p>Unit price: <span>Rs.${item.price.toFixed(2)}</span></p>
            <div class="qty-controls">
              <button onclick="decreaseQuantity('${item.name}')" class="qty-btn">−</button>
              <span class="qty-num">${item.quantity}</span>
              <button onclick="increaseQuantity('${item.name}')" class="qty-btn">+</button>
            </div>
            <p style="margin-top: 10px; font-size: var(--text-sm);">Subtotal: <span>Rs.${itemTotal.toFixed(2)}</span></p>
            <button onclick="removeItem('${item.name}')" class="remove-btn">
              <i class="fas fa-trash-alt"></i> Remove
            </button>
          </div>
        `;
        cartItemsDiv.appendChild(itemDiv);
      });

      const subtotalEl = document.getElementById('subtotalPrice');
      const totalEl = document.getElementById('totalPrice');
      if (subtotalEl) subtotalEl.innerText = `Rs.${grandTotal.toFixed(2)}`;
      if (totalEl) totalEl.innerText = `Rs.${grandTotal.toFixed(2)}`;
      const summary = document.getElementById('cartSummary');
      if (summary) summary.style.display = 'block';
    }

    function increaseQuantity(productName) {
      let cart = JSON.parse(localStorage.getItem('cart')) || [];
      const item = cart.find(item => item.name === productName);
      if (item) {
        item.quantity += 1;
        localStorage.setItem('cart', JSON.stringify(cart));
        loadCart();
        updateCartCount();
      }
    }

    function decreaseQuantity(productName) {
      let cart = JSON.parse(localStorage.getItem('cart')) || [];
      const itemIndex = cart.findIndex(item => item.name === productName);
      if (itemIndex !== -1) {
        const item = cart[itemIndex];
        item.quantity -= 1;
        if (item.quantity <= 0) cart.splice(itemIndex, 1);
        localStorage.setItem('cart', JSON.stringify(cart));
        loadCart();
        updateCartCount();
      }
    }

    function removeItem(productName) {
      let cart = JSON.parse(localStorage.getItem('cart')) || [];
      cart = cart.filter(item => item.name !== productName);
      localStorage.setItem('cart', JSON.stringify(cart));
      loadCart();
      updateCartCount();
    }

    function proceedToCheckout() {
      window.location.href = "payment.html";
    }
  </script>
</body>
</html>
