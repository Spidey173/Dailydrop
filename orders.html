<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Orders — DailyDrop</title>
  <meta name="description" content="View your order history on DailyDrop.">
  <link rel="icon" type="image/png" href="./static/logo1.webp">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="./design-system.css">
  <script>
    (function() {
      const theme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>

  <style>
    body {
      background: var(--surface-1);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── ORDERS PAGE ── */
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: var(--space-10) var(--space-6);
    }

    /* ── SECTION TITLE ── */
    .section-title {
      font-size: var(--text-2xl);
      font-weight: var(--weight-bold);
      color: var(--text-primary);
      letter-spacing: -0.3px;
      margin-bottom: var(--space-8);
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .section-title::before {
      content: '';
      width: 4px;
      height: 28px;
      background: linear-gradient(to bottom, var(--brand), var(--brand-dark));
      border-radius: var(--radius-full);
      flex-shrink: 0;
    }

    /* ── ORDER CARD ── */
    .order-card {
      background: var(--surface-0);
      border-radius: var(--radius-xl);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-card);
      padding: var(--space-6);
      margin-bottom: var(--space-6);
      transition: all 0.3s var(--ease-out);
      overflow: hidden;
      position: relative;
    }

    .order-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--brand), var(--brand-dark));
    }

    .order-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-lg);
      border-color: rgba(22, 163, 74, 0.15);
    }

    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: var(--space-5);
      padding-bottom: var(--space-4);
      border-bottom: 1px solid var(--border);
      gap: var(--space-4);
      flex-wrap: wrap;
    }

    .order-id {
      font-size: var(--text-base);
      font-weight: var(--weight-bold);
      color: var(--text-primary);
      letter-spacing: -0.2px;
      margin-bottom: 4px;
    }

    .order-date {
      font-size: var(--text-xs);
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 4px;
    }

    .order-status {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      font-weight: var(--weight-semi);
      background: var(--success-light);
      color: #15803d;
      border: 1px solid rgba(34, 197, 94, 0.2);
      margin-top: var(--space-2);
    }

    .order-meta-right {
      text-align: right;
    }

    .order-total {
      font-size: var(--text-xl);
      font-weight: var(--weight-bold);
      color: var(--brand);
      letter-spacing: -0.4px;
      line-height: 1;
    }

    .order-address {
      font-size: var(--text-xs);
      color: var(--text-muted);
      margin-top: var(--space-2);
      display: flex;
      align-items: flex-start;
      justify-content: flex-end;
      gap: 5px;
      max-width: 280px;
      text-align: right;
    }

    .order-address i { color: var(--brand); margin-top: 2px; flex-shrink: 0; }

    /* ── TIMELINE TRACK ── */
    .timeline-container {
      margin: var(--space-6) 0 var(--space-8);
      padding: var(--space-4) 0;
      background: var(--surface-1);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
    }

    .timeline-steps {
      display: flex;
      justify-content: space-around;
      position: relative;
      max-width: 600px;
      margin: 0 auto;
    }

    .timeline-steps::before {
      content: '';
      position: absolute;
      top: 15px;
      left: 10%;
      right: 10%;
      height: 3px;
      background: var(--border-strong);
      z-index: 1;
    }

    .timeline-progress-bar {
      position: absolute;
      top: 15px;
      left: 10%;
      width: 80%; /* Active full delivery since it says delivered */
      height: 3px;
      background: var(--brand);
      z-index: 1;
    }

    .timeline-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 2;
      flex: 1;
    }

    .timeline-icon {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-full);
      background: var(--surface-0);
      border: 2px solid var(--border-strong);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-xs);
      color: var(--text-muted);
      transition: all var(--duration-base) var(--ease-out);
    }

    .timeline-step.active .timeline-icon {
      background: var(--brand);
      border-color: var(--brand);
      color: white;
      box-shadow: 0 0 0 4px var(--brand-glow);
    }

    .timeline-label {
      margin-top: var(--space-2);
      font-size: 11px;
      font-weight: var(--weight-semi);
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .timeline-step.active .timeline-label {
      color: var(--text-primary);
      font-weight: var(--weight-bold);
    }

    /* ── ORDERED ITEMS ── */
    .order-products { margin-top: var(--space-4); }

    .products-title {
      font-size: var(--text-xs);
      font-weight: var(--weight-semi);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: var(--space-3);
    }

    .product-item {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3);
      background: var(--surface-1);
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      margin-bottom: var(--space-2);
      transition: border-color 0.2s;
    }

    .product-item:hover { border-color: var(--border-brand); }

    .product-image {
      width: 56px;
      height: 56px;
      object-fit: contain;
      border-radius: var(--radius-sm);
      background: var(--surface-0);
      border: 1px solid var(--border);
      padding: 4px;
      flex-shrink: 0;
    }

    .product-info { flex: 1; min-width: 0; }

    .product-name {
      font-size: var(--text-sm);
      font-weight: var(--weight-semi);
      color: var(--text-primary);
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .product-price {
      font-size: var(--text-xs);
      color: var(--text-muted);
    }

    .product-quantity {
      background: var(--brand-lighter);
      color: var(--brand);
      border: 1px solid var(--brand-light);
      border-radius: var(--radius-md);
      padding: 4px 12px;
      font-size: var(--text-xs);
      font-weight: var(--weight-bold);
      flex-shrink: 0;
    }

    /* ── EMPTY STATE ── */
    .no-orders {
      text-align: center;
      padding: var(--space-20) var(--space-8);
      background: var(--surface-0);
      border-radius: var(--radius-xl);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-md);
    }

    .no-orders-icon {
      font-size: 3.5rem;
      display: block;
      margin-bottom: var(--space-4);
      opacity: 0.4;
    }

    .no-orders h3 {
      font-size: var(--text-xl);
      font-weight: var(--weight-semi);
      color: var(--text-primary);
      margin-bottom: var(--space-2);
    }

    .no-orders p {
      font-size: var(--text-sm);
      color: var(--text-muted);
      margin-bottom: var(--space-6);
    }

    .shop-btn {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: 12px 24px;
      background: var(--brand);
      color: white;
      border-radius: var(--radius-full);
      font-weight: var(--weight-semi);
      font-size: var(--text-sm);
      text-decoration: none;
      transition: all 0.25s var(--ease-out);
      box-shadow: var(--shadow-brand);
    }

    .shop-btn:hover {
      background: var(--brand-dark);
      transform: translateY(-2px);
      box-shadow: var(--shadow-brand-lg);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .order-header { flex-direction: column; gap: var(--space-3); }
      .order-meta-right { text-align: left; }
      .order-address { justify-content: flex-start; text-align: left; }
      .product-item { flex-wrap: wrap; }
      .timeline-label { font-size: 9px; }
      .timeline-icon { width: 28px; height: 28px; }
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="ds-nav">
    <div class="ds-nav-inner">
      <a href="index.html" class="ds-logo">
        <div class="ds-logo-icon">🛒</div>
        <div class="ds-logo-text">Daily<span>Drop</span></div>
      </a>
      <div class="ds-nav-actions">
        <button class="theme-toggle-pill" id="theme-toggle" aria-label="Toggle theme">
          <span class="theme-toggle-pill-thumb"></span>
          <span class="theme-toggle-pill-icon light-icon"><i class="fas fa-sun"></i></span>
          <span class="theme-toggle-pill-icon dark-icon"><i class="fas fa-moon"></i></span>
        </button>
        <a href="index.html" class="btn-nav"><i class="fas fa-home"></i> Home</a>
        <a href="cart.html" class="btn-cart">
          <i class="fas fa-shopping-bag"></i> Cart
          <span class="cart-badge" id="cart-count">0</span>
        </a>
      </div>
    </div>
  </nav>

  <main style="flex: 1;">
    <div class="container" id="ordersContainer">
      <!-- Populated dynamically via JavaScript -->
    </div>
  </main>

  <!-- Footer -->
  <footer class="ds-footer">
    <div class="container">
      <div style="text-align: center; padding: var(--space-8) 0; color: var(--text-muted); font-size: var(--text-xs); border-top: 1px solid rgba(255,255,255,0.06);">
        &copy; 2026 DailyDrop. All rights reserved.
      </div>
    </div>
  </footer>

  <script src="js/cart-system.js" defer></script>
  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const allOrders = JSON.parse(localStorage.getItem('orders')) || [];
    const userOrders = allOrders;
    const ordersContainer = document.getElementById('ordersContainer');
    if (!ordersContainer) return;

    ordersContainer.innerHTML = '<h2 class="section-title">My Orders</h2>';

    if (userOrders.length === 0) {
      ordersContainer.innerHTML += `
        <div class="no-orders">
          <span class="no-orders-icon">📦</span>
          <h3>No orders yet</h3>
          <p>You haven't placed any orders yet.<br>Start shopping and your orders will appear here.</p>
          <a href="index.html" class="shop-btn"><i class="fas fa-shopping-bag"></i> Start Shopping</a>
        </div>
      `;
      return;
    }

    userOrders.forEach(order => {
      let formattedDate = "";
      try {
        const dateObj = new Date(order.order_date);
        formattedDate = dateObj.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
      } catch (e) {
        formattedDate = order.order_date;
      }

      let productsHTML = '';
      order.products.forEach(product => {
        productsHTML += `
          <div class="product-item">
            <img src="${product.image_path}" class="product-image" alt="${product.name}" onerror="this.src='./static/logo1.webp'">
            <div class="product-info">
              <div class="product-name">${product.name}</div>
              <div class="product-price">Rs.${product.price}</div>
            </div>
            <span class="product-quantity">${product.quantity} item${product.quantity > 1 ? 's' : ''}</span>
          </div>
        `;
      });

      const orderCard = `
        <div class="order-card">
          <div class="order-header">
            <div>
              <div class="order-id">Order #${order.order_id}</div>
              <div class="order-date"><i class="far fa-calendar-alt"></i> ${formattedDate}</div>
              <span class="order-status"><i class="fas fa-check-circle"></i> Delivered</span>
            </div>
            <div class="order-meta-right">
              <div class="order-total">Rs.${order.total_amount}</div>
              <div class="order-address"><i class="fas fa-map-marker-alt"></i>${order.address}</div>
            </div>
          </div>

          <!-- Quick Delivery Progress Timeline -->
          <div class="timeline-container">
            <div class="timeline-steps">
              <div class="timeline-progress-bar"></div>
              <div class="timeline-step active">
                <div class="timeline-icon"><i class="fas fa-clipboard-list"></i></div>
                <div class="timeline-label">Ordered</div>
              </div>
              <div class="timeline-step active">
                <div class="timeline-icon"><i class="fas fa-box"></i></div>
                <div class="timeline-label">Packed</div>
              </div>
              <div class="timeline-step active">
                <div class="timeline-icon"><i class="fas fa-shipping-fast"></i></div>
                <div class="timeline-label">On The Way</div>
              </div>
              <div class="timeline-step active">
                <div class="timeline-icon"><i class="fas fa-home"></i></div>
                <div class="timeline-label">Delivered</div>
              </div>
            </div>
          </div>

          <div class="order-products">
            <div class="products-title">Ordered Items</div>
            ${productsHTML}
          </div>
        </div>
      `;
      ordersContainer.insertAdjacentHTML('beforeend', orderCard);
    });
  });
  </script>
</body>
</html>
